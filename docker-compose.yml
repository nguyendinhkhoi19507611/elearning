version: '3.8'

services:
  # ── MongoDB ──
  mongodb:
    image: mongo:7
    container_name: elearning-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  # ── Backend API ──
  backend:
    build: ./backend
    container_name: elearning-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/elearning
      - JWT_SECRET=elearning_ai_secret_key_2026
      - AI_VISION_URL=http://vision:5001
      - AI_VOICE_URL=http://voice:5002
      - AI_RECOMMEND_URL=http://recommend:5003
    restart: unless-stopped

  # ── AI Vision Service ──
  vision:
    build: ./ai-services
    container_name: elearning-vision
    command: python vision_api.py
    ports:
      - "5001:5001"
    volumes:
      - ../output/models:/app/models
    restart: unless-stopped

  # ── AI Voice Service ──
  voice:
    build: ./ai-services
    container_name: elearning-voice
    command: python voice_api.py
    ports:
      - "5002:5002"
    volumes:
      - ../data/voice:/app/data/voice
    restart: unless-stopped

  # ── Recommendation Service ──
  recommend:
    build: ./ai-services
    container_name: elearning-recommend
    command: python recommendation_api.py
    ports:
      - "5003:5003"
    volumes:
      - ../data/learning:/app/data/learning
      - ../output/learning_models:/app/models/learning
    restart: unless-stopped

  # ── Frontend ──
  frontend:
    build: ./frontend
    container_name: elearning-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
